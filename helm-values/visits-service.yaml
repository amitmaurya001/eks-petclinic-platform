# Visits Service — Visit records
# Port: 8082
# MySQL-backed (yes)
# Init: wait-for-config-server, wait-for-discovery-server
# Secret ref: rds-credentials (envFrom)
# Env: uses SPRING_DATASOURCE_URL from configmap
# Profiles: docker,mysql

name: visits-service
namespace: "petclinic-dev"
component: service

replicaCount: 1

image:
  repository: "478468080326.dkr.ecr.us-east-1.amazonaws.com/petclinic-dev/visits-service"
  tag: "85ed54d"
  pullPolicy: Always

service:
  port: 8082

serviceAccount:
  name: visits-service-sa

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    waitFor: config-server
  - name: wait-for-discovery-server
    image: busybox:1.36
    waitFor: discovery-server

env:
  - name: SPRING_PROFILES_ACTIVE
    value: docker,mysql
  - name: CONFIG_SERVER_URL
    value: http://config-server:8888
  - name: DISCOVERY_SERVER_URL
    value: http://discovery-server:8761


envFrom:
  - secretRef:
      name: rds-credentials

configMap:
  CONFIG_SERVER_URL: http://config-server:8888
  DISCOVERY_SERVER_URL: http://discovery-server:8761

probes:
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 3
    timeoutSeconds: 5

startupProbe:
  enabled: true
  path: /actuator/health
  initialDelaySeconds: 0
  periodSeconds: 10
  failureThreshold: 30
  timeoutSeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false