# Customers Service — owners & pets
# Port: 8081
# MySQL-backed (yes)
# Init: wait-for-config-server, wait-for-discovery-server
# Secret ref: rds-credentials (envFrom)
# Env: uses SPRING_DATASOURCE_URL from configmap
# Profiles: docker,mysql

name: customers-service
namespace: "petclinic-dev"
component: service

replicaCount: 1

image:
  repository: "478468080326.dkr.ecr.us-east-1.amazonaws.com/petclinic-dev/customers-service"
  tag: "85ed54d"
  pullPolicy: Always

service:
  port: 8081

serviceAccount:
  name: customers-service

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command:
      - /bin/sh
      - -c
      - |
        until wget -q --spider http://config-server:8888/actuator/health 2>/dev/null; do
          echo "waiting for config-server..."
          sleep 5
        done
        echo "config-server is ready"
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
      runAsNonRoot: true
      runAsUser: 1000
  - name: wait-for-discovery-server
    image: busybox:1.36
    command:
      - /bin/sh
      - -c
      - |
        until wget -q --spider http://discovery-server:8761/actuator/health 2>/dev/null; do
          echo "waiting for discovery-server..."
          sleep 5
        done
        echo "discovery-server is ready"
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
      runAsNonRoot: true
      runAsUser: 1000

env:
  - name: SPRING_PROFILES_ACTIVE
    value: docker,mysql
  - name: CONFIG_SERVER_URL
    value: http://config-server:8888


envFrom:
  - secretRef:
      name: rds-credentials

configMap:
  CONFIG_SERVER_URL: http://config-server:8888

probes:
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 3
    timeoutSeconds: 5

startupProbe:
  enabled: true
  path: /actuator/health
  initialDelaySeconds: 0
  periodSeconds: 10
  failureThreshold: 30
  timeoutSeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false