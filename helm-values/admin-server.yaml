# Admin Server — Spring Boot Admin Dashboard
# Port: 9090
# Init: wait-for-config-server, wait-for-discovery-server
# No MySQL
# No serviceAccount config

name: admin-server
namespace: "petclinic-dev"
component: admin

replicaCount: 1

image:
  repository: "478468080326.dkr.ecr.us-east-1.amazonaws.com/petclinic-dev/admin-server"
  tag: "85ed54d"
  pullPolicy: Always

service:
  port: 9090

serviceAccount:
  name: admin-server-sa

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    waitFor: config-server
  - name: wait-for-discovery-server
    image: busybox:1.36
    waitFor: discovery-server

env:
  - name: SPRING_PROFILES_ACTIVE
    value: docker
  - name: CONFIG_SERVER_URL
    valueFrom:
      configMapKeyRef:
        name: admin-server-config
        key: CONFIG_SERVER_URL

configMap:
  CONFIG_SERVER_URL: http://config-server:8888

probes:
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 3
    timeoutSeconds: 5

startupProbe:
  enabled: true
  path: /actuator/health
  initialDelaySeconds: 0
  periodSeconds: 10
  failureThreshold: 30
  timeoutSeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false