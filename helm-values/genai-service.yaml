# GenAI Service — LLM-powered AI assistant
# Port: 8084
# No MySQL (config-only)
# Init: wait-for-config-server, wait-for-discovery-server
# Secret: OPENAI_API_KEY from K8s secret (openai-api-key)
# LLM config: uses OPENAI_BASE_URL + OPENAI_MODEL for provider flexibility
# Default: OpenAI (ChatGPT), can be swapped to Groq, Together AI, etc.

name: genai-service
namespace: "petclinic-dev"
component: service

replicaCount: 1

image:
  repository: "478468080326.dkr.ecr.us-east-1.amazonaws.com/petclinic-dev/genai-service"
  tag: "85ed54d"
  pullPolicy: Always

service:
  port: 8084

serviceAccount:
  name: genai-service

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    waitFor: config-server
  - name: wait-for-discovery-server
    image: busybox:1.36
    waitFor: discovery-server

env:
  - name: SPRING_PROFILES_ACTIVE
    value: docker
  - name: CONFIG_SERVER_URL
    value: http://config-server:8888
  - name: OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: openai-api-key
        key: OPENAI_API_KEY


configMap:
  CONFIG_SERVER_URL: http://config-server:8888

probes:
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 3
    timeoutSeconds: 5

startupProbe:
  enabled: true
  path: /actuator/health
  initialDelaySeconds: 0
  periodSeconds: 10
  failureThreshold: 30
  timeoutSeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false