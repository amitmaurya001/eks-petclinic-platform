apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: petclinic-dev
  labels:
    app: api-gateway
    component: gateway
    tier: frontend
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP