apiVersion: apps/v1
kind: Deployment
metadata:
    name: admin-server
    namespace: petclinic-dev
    labels:
        app: admin-server
        component: admin
        app.kubernetes.io/name: admin-server
        app.kubernetes.io/part-of: petclinic
        app.kubernetes.io/managed-by: Helm
spec:
    replicas: 1
    selector:
        matchLabels:
            app.kubernetes.io/name: admin-server
            app.kubernetes.io/part-of: petclinic
    template:
        metadata:
            labels:
                app: admin-server
                component: admin
                app.kubernetes.io/name: admin-server
                app.kubernetes.io/part-of: petclinic
                app.kubernetes.io/managed-by: Helm
        spec:
            serviceAccountName: admin-server-sa
            securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                fsGroup: 1000
                seccompProfile:
                    type: RuntimeDefault
            initContainers:
                - name: wait-for-config-server
                  image: busybox:1.36
                  command:
                      - /bin/sh
                      - -c
                      - |
                          echo "Waiting for config-server on http://config-server:8888/actuator/health ..."
                          until wget -q --spider http://config-server:8888/actuator/health 2>/dev/null; do
                            echo "config-server not ready, sleeping 2s..."
                            sleep 2
                          done
                          echo "config-server is ready."
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                      readOnlyRootFilesystem: true
                      runAsNonRoot: true
                      runAsUser: 1000
                - name: wait-for-discovery-server
                  image: busybox:1.36
                  command:
                      - /bin/sh
                      - -c
                      - |
                          echo "Waiting for discovery-server on http://discovery-server:8761/actuator/health ..."
                          until wget -q --spider http://discovery-server:8761/actuator/health 2>/dev/null; do
                            echo "discovery-server not ready, sleeping 2s..."
                            sleep 2
                          done
                          echo "discovery-server is ready."
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                      readOnlyRootFilesystem: true
                      runAsNonRoot: true
                      runAsUser: 1000
            containers:
                - name: admin-server
                  image: 478468080326.dkr.ecr.us-east-1.amazonaws.com/petclinic-dev/admin-server:85ed54d
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 9090
                        protocol: TCP
                  env:
                      - name: SPRING_PROFILES_ACTIVE
                        value: docker
                      - name: CONFIG_SERVER_URL
                        valueFrom:
                            configMapKeyRef:
                                name: admin-server-config
                                key: CONFIG_SERVER_URL
                  startupProbe:
                      httpGet:
                          path: /actuator/health
                          port: 9090
                      periodSeconds: 10
                      failureThreshold: 30
                      timeoutSeconds: 5
                  readinessProbe:
                      httpGet:
                          path: /actuator/health/readiness
                          port: 9090
                      periodSeconds: 10
                      failureThreshold: 3
                      timeoutSeconds: 5
                  livenessProbe:
                      httpGet:
                          path: /actuator/health/liveness
                          port: 9090
                      periodSeconds: 15
                      failureThreshold: 3
                      timeoutSeconds: 5
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                      readOnlyRootFilesystem: false
---
