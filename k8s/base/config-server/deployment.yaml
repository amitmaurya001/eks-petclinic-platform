apiVersion: apps/v1
kind: Deployment
metadata:
    name: config-server
    namespace: petclinic-dev
    labels:
        app.kubernetes.io/name: config-server
        app.kubernetes.io/part-of: petclinic
        app.kubernetes.io/managed-by: Helm
spec:
    replicas: 1
    selector:
        matchLabels:
            app.kubernetes.io/name: config-server
    template:
        metadata:
            labels:
                app.kubernetes.io/name: config-server
                app.kubernetes.io/part-of: petclinic
                app.kubernetes.io/managed-by: Helm
        spec:
            securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                fsGroup: 1000
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: config-server
                  image: 478468080326.dkr.ecr.us-east-1.amazonaws.com/petclinic-dev/config-server:85ed54d
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 8888
                        protocol: TCP
                  env:
                      - name: SPRING_PROFILES_ACTIVE
                        value: docker
                      - name: GIT_REPO
                        valueFrom:
                            configMapKeyRef:
                                name: config-server-config
                                key: GIT_REPO
                  startupProbe:
                      httpGet:
                          path: /actuator/health
                          port: 8888
                      periodSeconds: 10
                      failureThreshold: 30
                      timeoutSeconds: 5
                  readinessProbe:
                      httpGet:
                          path: /actuator/health
                          port: 8888
                      periodSeconds: 10
                      failureThreshold: 3
                      timeoutSeconds: 5
                  livenessProbe:
                      httpGet:
                          path: /actuator/health
                          port: 8888
                      periodSeconds: 15
                      failureThreshold: 3
                      timeoutSeconds: 5
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                      readOnlyRootFilesystem: false
            initContainers: []
